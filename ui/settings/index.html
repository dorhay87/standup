<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'">
<title>Standup</title>
<link rel="stylesheet" href="../shared/tokens.css">
<link rel="stylesheet" href="settings.css">
</head>
<body>
<div class="stand-root" id="root" data-theme="light">
  <div class="stand-win">

    <!-- titlebar -->
    <div class="titlebar" data-tauri-drag-region>
      <div class="tb-group">
        <button class="tb-btn" id="btn-theme" aria-label="Toggle dark mode">☾</button>
        <button class="tb-btn" id="btn-accent" aria-label="Accent color"><span class="accent-dot"></span></button>
      </div>
      <div class="tb-group">
        <button class="tb-btn" id="btn-min" aria-label="Minimize"><span class="tb-minbar"></span></button>
        <button class="tb-btn tb-close" id="btn-close" aria-label="Close">✕</button>
      </div>
    </div>

    <!-- header: identity + master toggle -->
    <div class="header" data-tauri-drag-region>
      <svg class="app-icon" aria-hidden="true"><use href="#logo"/></svg>
      <div class="header-text" data-tauri-drag-region>
        <div class="header-title" data-tauri-drag-region>Standup</div>
        <div class="header-sub" data-tauri-drag-region>Stand &amp; move reminders</div>
      </div>
      <button class="switch" id="master-toggle" aria-label="Master toggle">
        <span class="switch-knob"></span>
      </button>
    </div>

    <!-- status card -->
    <div class="status-card">
      <div class="status-row">
        <span class="status-label">Next reminder</span>
        <span class="status-pill" id="status-pill">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-word">On</span>
        </span>
      </div>
      <div class="status-time-row" id="status-time-row">
        <span class="status-time" id="next-time">-</span>
        <span class="status-countdown" id="countdown"></span>
      </div>
      <div class="status-off" id="status-off" hidden>Reminders are off</div>
      <div class="status-summary" id="schedule-summary"></div>
    </div>

    <!-- controls (dim when off) -->
    <div class="controls" id="controls">

      <!-- interval -->
      <div>
        <div class="ctl-label-row">
          <span class="ctl-label">Remind me every</span>
          <span class="ctl-label-unit">minutes</span>
        </div>
        <div class="segments" id="segments"></div>
      </div>

      <!-- active hours -->
      <div>
        <div class="ctl-label">Active hours</div>
        <div class="hours-row">
          <input class="stand-time" type="time" id="start-time" value="09:00">
          <span class="hours-to">to</span>
          <input class="stand-time" type="time" id="end-time" value="18:00">
        </div>
      </div>

      <!-- active days -->
      <div>
        <div class="ctl-label">Active days</div>
        <div class="days" id="days"></div>
      </div>

      <!-- sound -->
      <div>
        <div class="ctl-label">Sound</div>
        <div class="sound-picker">
          <button class="sound-select" id="sound-select">
            <span id="sound-select-name">Chime</span>
            <span class="sound-chevron"></span>
          </button>
          <button class="sound-preview" id="sound-preview" aria-label="Preview">
            <span class="sound-preview-tri"></span>
          </button>
          <div class="sound-menu" id="sound-menu" hidden></div>
        </div>
      </div>

    </div>

    <!-- run on startup (app-level, not dimmed with the schedule) -->
    <div class="startup-row" id="startup-row">
      <div class="startup-text">
        <div class="ctl-label">Run on startup</div>
        <div class="startup-sub" id="startup-sub">Start with Windows, minimized to the tray</div>
      </div>
      <button class="switch switch-sm" id="startup-toggle" aria-label="Run on startup">
        <span class="switch-knob"></span>
      </button>
    </div>

    <div class="accent-menu" id="accent-menu" hidden></div>

  </div>

<!-- app logo (accent-aware via stop-color; must be inside .stand-root for var(--accent)) -->

</svg>
</div>
